<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Teal rounded background -->
  <rect width="32" height="32" rx="7" fill="#0e6b80"/>
  <!-- Italic bold lowercase 'a' — Georgia renders a bubbly, rounded glyph -->
  <text
    x="16"
    y="22"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="25"
    font-style="italic"
    font-weight="normal"
    text-anchor="middle"
    fill="white"
  >a</text>
</svg>
